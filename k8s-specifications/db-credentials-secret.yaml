apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  username: postgres
  password: postgres

---
# NOTE: For production use, create this secret separately using:
# kubectl create secret generic db-credentials \
#   --from-literal=username=<your-username> \
#   --from-literal=password=<your-strong-password>
#
# Do NOT commit actual production credentials to version control!
# Use Kubernetes Secrets management or a secrets operator like Sealed Secrets or External Secrets.
