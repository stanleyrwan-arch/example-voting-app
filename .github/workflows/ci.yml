name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build vote service
        uses: docker/build-push-action@v5
        with:
          context: ./vote
          target: final
          push: false
          load: true
          tags: example-voting-app/vote:test

      - name: Build result service
        uses: docker/build-push-action@v5
        with:
          context: ./result
          push: false
          load: true
          tags: example-voting-app/result:test

      - name: Build worker service
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          load: true
          tags: example-voting-app/worker:test

      - name: Verify Docker images were built
        run: |
          docker image ls | grep example-voting-app

      - name: Start services with Docker Compose
        run: docker-compose up -d
        env:
          COMPOSE_PROJECT_NAME: ci-test

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to start..."
          sleep 10
          docker-compose ps

      - name: Check vote service connectivity
        run: |
          docker-compose exec -T vote curl -f http://localhost/ || true

      - name: Check result service connectivity
        run: |
          docker-compose exec -T result curl -f http://localhost/ || true

      - name: Test vote endpoint
        run: |
          # Test if vote app responds
          VOTE_PORT=8080
          max_attempts=30
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            if curl -f http://localhost:$VOTE_PORT/ > /dev/null 2>&1; then
              echo "Vote service is responding"
              exit 0
            fi
            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts - waiting for vote service..."
            sleep 1
          done

          echo "Vote service failed to respond"
          exit 1

      - name: Test result endpoint
        run: |
          # Test if result app responds
          RESULT_PORT=8081
          max_attempts=30
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            if curl -f http://localhost:$RESULT_PORT/ > /dev/null 2>&1; then
              echo "Result service is responding"
              exit 0
            fi
            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts - waiting for result service..."
            sleep 1
          done

          echo "Result service failed to respond"
          exit 1

      - name: Verify database connectivity
        run: |
          docker-compose exec -T db psql -U postgres -c "SELECT 1" || true

      - name: Check Docker Compose logs
        if: always()
        run: docker-compose logs --tail=50

      - name: Stop services
        if: always()
        run: docker-compose down -v

  lint-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install pylint flake8

      - name: Lint vote service
        run: |
          flake8 vote/app.py --max-line-length=120 --ignore=E501,W503 || true
          pylint vote/app.py --disable=all --enable=E,F || true

  lint-javascript:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install result dependencies
        run: cd result && npm ci

      - name: Check for npm vulnerabilities
        run: cd result && npm audit --audit-level=moderate || true

  lint-dotnet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0'

      - name: Restore worker dependencies
        run: cd worker && dotnet restore

      - name: Build worker
        run: cd worker && dotnet build --no-restore --configuration Release

      - name: Check for code style issues
        run: cd worker && dotnet format --verify-no-changes --verbosity diagnostic || true

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner on Dockerfiles
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
